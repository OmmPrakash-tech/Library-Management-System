<section class="user-section">
  <div class="user-container">

    <!-- LEFT SIDE -->
    <div class="user-left">
      <h2>Manage Users 👥</h2>

      <p>
        Take full control of user accounts from this panel. 
        Add new users, update profiles, manage permissions, 
        and ensure secure access across your platform.
      </p>

      <p>
        Monitor user activity and maintain system integrity 
        with powerful administrative tools.
      </p>

      <button class="control-btn" (click)="controlUsers()">
        Control Users
      </button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="user-right">
      <img src="user-control.png" alt="User Control" />
    </div>

  </div>
</section>
