<div class="controller-container">

  <div class="controller-header">
    <h1>Book Controller 📚</h1>
    <p>
      Manage your book collection efficiently. Add new books, view records,
      and maintain your library system with ease.
    </p>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="controller-actions">

    <button class="action-btn" (click)="onAddBook()">
      ➕ Add Book
    </button>

    <button class="action-btn" (click)="onViewBooks()">
      📖 View Books
    </button>

    <button class="action-btn" (click)="onManageBooks()">
      ⚙️ Manage Books
    </button>

  </div>

</div>
