<div class="dashboard-container">

  <h1>📊 Book Management Dashboard</h1>

  <!-- 🔢 CARDS -->
  <div class="stats">

    <div class="card total">
      <h2>Total Books</h2>
      <p>{{ totalBooks }}</p>
    </div>

    <div class="card active">
      <h2>Active Books</h2>
      <p>{{ activeBooks }}</p>
    </div>

    <div class="card deleted">
      <h2>Deleted Books</h2>
      <p>{{ deletedBooks }}</p>
    </div>

  </div>

  <!-- 📊 GRAPH -->
  <div class="graph">

    <h2>📈 Overview</h2>

    <div class="bar-container">

      <div class="bar total-bar" [style.height.%]="(totalBooks / totalBooks) * 100">
        <span>Total</span>
      </div>

      <div class="bar active-bar" [style.height.%]="(activeBooks / totalBooks) * 100">
        <span>Active</span>
      </div>

      <div class="bar deleted-bar" [style.height.%]="(deletedBooks / totalBooks) * 100">
        <span>Deleted</span>
      </div>

    </div>

  </div>

</div>
