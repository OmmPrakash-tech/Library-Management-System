<div class="review-container">

  <!-- 🔝 HEADER -->
  <div class="header">
    <h2>📚 All Reviews</h2>

    <button class="refresh-btn" (click)="refresh()">
      🔄 Refresh
    </button>
  </div>

  <!-- ❌ EMPTY -->
  <div *ngIf="reviews.length === 0" class="empty">
    No reviews found
  </div>

  <!-- ✅ REVIEW LIST -->
  <div class="review-card" *ngFor="let review of reviews">

    <!-- TOP -->
    <div class="top">
      <h3>{{ review.bookTitle }}</h3>
      <span class="rating">⭐ {{ review.rating }}/5</span>
    </div>

    <!-- REVIEW TITLE -->
    <h4 class="review-title">{{ review.title }}</h4>

    <!-- REVIEW TEXT -->
    <p class="comment">{{ review.reviewText }}</p>

    <!-- BOOK INFO -->
    <p class="book-info">
      📖 {{ review.bookAuthor }} | ISBN: {{ review.bookIsbn }}
    </p>

    <!-- BOTTOM -->
    <div class="bottom">
      <span>👤 {{ review.userName }}</span>
      <span>📅 {{ review.createdAt | date:'medium' }}</span>
    </div>

    <!-- DELETE BUTTON -->
    <button 
      class="delete-btn" 
      *ngIf="review.isOwner"
      (click)="deleteReview(review.id)">
      ❌ Delete
    </button>

  </div>

</div>
