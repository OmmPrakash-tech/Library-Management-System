<div class="main-container">
  <h2 class="title">My Book Loans</h2>

  <div *ngIf="loading" class="loading">
    Loading...
  </div>

  <div *ngIf="!loading && loans.length === 0" class="empty">
    No borrowed books
  </div>

  <table *ngIf="!loading && loans.length > 0">
    <thead>
      <tr>
        <th>Book Title</th>
        <th>Due Date</th>
        <th>Renewals</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let loan of loans">

        <!-- 📘 Book -->
        <td class="book-title">{{ loan.bookTitle }}</td>

        <!-- 📅 Due Date -->
        <td [ngClass]="{ 'overdue': isOverdue(loan.dueDate) }">
          {{ loan.dueDate | date:'mediumDate' }}
        </td>

        <!-- 🔁 Renew -->
        <td class="renew-cell">
          {{ loan.renewalCount }} / {{ loan.maxRenewals }}
        </td>

        <!-- 🎯 Actions -->
        <td>
          <ng-container *ngIf="loan.status === 'CHECKED_OUT'; else noAction">

            <div class="action-group">
              <button 
                class="btn renew-btn" 
                (click)="renewBook(loan)"
                [disabled]="loan.renewalCount >= loan.maxRenewals || !loan.canRenew">
                Renew
              </button>

              <button 
                class="btn return-btn" 
                (click)="returnBook(loan)">
                Return
              </button>
            </div>

          </ng-container>

          <!-- ✅ Returned + Review -->
          <ng-template #noAction>
            <div class="action-inline">
              <span class="returned-label">Returned</span>

              <button 
                class="btn review-btn"
                (click)="goToReview(loan.bookId)">
                Review
              </button>
            </div>
          </ng-template>
        </td>

      </tr>
    </tbody>
  </table>
</div>
