<div class="main-container">

  <h1 class="title">📚 Book Loan Dashboard</h1>

  <!-- 🔵 TOP ROW (Renew + Issue) -->
  <div class="top-row">


        <!-- Issue Book -->
    <div class="oval-card">
      <h2>📖 Issue Book</h2>
      <p>Verify and manage books currently issued to you.</p>
      <button routerLink="/issue-book">Details</button>
    </div>

    <!-- Renew & Return -->
    <div class="oval-card">
      <h2>🔄 Renew & Return</h2>
      <p>Extend your borrowing period or return books easily.</p>
      <button routerLink="/renew-return">Details</button>
    </div>



  </div>

  <!-- 🔵 BOTTOM ROW (Fine centered) -->
  <div class="bottom-row">

    <!-- Fine -->
    <div class="oval-card fine-card">
      <h2>💸 Fine</h2>
      <p>Check overdue fines and make quick payments for delayed books.</p>
      <button routerLink="/my-fines">View</button>
    </div>

  </div>

</div>
