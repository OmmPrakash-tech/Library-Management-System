<div class="profile-container">

  <!-- 🔝 TOP BAR (REMOVED EDIT BUTTON) -->
  <div class="top-bar">
    <!-- You can keep this empty or remove completely -->
  </div>

  <!-- 👤 PROFILE IMAGE -->
  <div class="profile-image" (click)="isEditMode && openModal()">

    <!-- ✅ SHOW USER IMAGE -->
    <img *ngIf="imageUrl; else defaultImg" [src]="imageUrl" alt="Profile Image" />

    <!-- ✅ DEFAULT IMAGE -->
    <ng-template #defaultImg>
      <img src="assets/default-user.png" alt="Default Image">
    </ng-template>

    <!-- ✏️ EDIT OVERLAY -->
    <span *ngIf="isEditMode" class="edit-overlay">
      Change
    </span>

  </div>

  <!-- 📄 USER INFO -->
  <div class="profile-info">

    <!-- 👀 VIEW MODE -->
    <div *ngIf="!isEditMode">
      <h3 class="username">{{ userName }}</h3>
      <p class="email">{{ email }}</p>
    </div>

    <!-- ✏️ EDIT MODE -->
    <div *ngIf="isEditMode" class="edit-section">

      <input 
        [(ngModel)]="userName" 
        placeholder="Enter name" 
      />

      <input 
        [(ngModel)]="email" 
        placeholder="Enter email" 
      />

      <button class="save-btn" (click)="saveProfile()">
        Save
      </button>

    </div>

  </div>

  <!-- 📁 HIDDEN FILE INPUT -->
  <input 
    type="file" 
    #fileInput 
    (change)="onFileSelected($event)" 
    hidden 
  />

  <!-- 🪟 IMAGE MODAL -->
  <div class="modal" *ngIf="showModal">

    <div class="modal-content">

      <h3>Select Profile Image</h3>

      <!-- 📂 Upload -->
      <button (click)="fileInput.click()">
        Upload from System
      </button>

      <!-- 🔗 URL -->
      <div class="url-section">
        <input 
          type="text" 
          [(ngModel)]="imageLink" 
          placeholder="Paste image URL" 
        />
        <button (click)="useImageLink()">Use</button>
      </div>

      <!-- ❌ CLOSE -->
      <button class="close-btn" (click)="closeModal()">
        Close
      </button>

    </div>

  </div>

  <!-- 🔽 BOTTOM SECTION -->
  <div class="profile-box">
    <button class="visit-btn" (click)="goToProfilePage()">
      Visit your profile
    </button>
  </div>

</div>
