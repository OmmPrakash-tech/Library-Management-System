<div class="profile-page">

  <!-- 🔄 REFRESH -->
  <div class="top-bar">
    <button 
      class="refresh-btn" 
      (click)="refreshProfile()" 
      [disabled]="isRefreshing">
      
      🔄 Refresh 
      <span *ngIf="isRefreshing">...</span>
    </button>
  </div>

  <!-- 🚀 LOADING -->
  <div *ngIf="isLoading; else profileBlock" class="loading-text">
    🚀 Loading your profile...
  </div>

  <!-- ✅ PROFILE -->
  <ng-template #profileBlock>

    <div class="profile-container">

      <!-- 👤 LEFT (IMAGE) -->
      <div class="left">

        <!-- ✅ SAFE IMAGE RENDER -->
        <img 
          *ngIf="user?.profileImage; else defaultImg"
          [src]="user.profileImage"
          alt="Profile Image"
        />

        <!-- DEFAULT IMAGE -->
        <ng-template #defaultImg>
          <img 
            src="https://via.placeholder.com/150"
            alt="Default Image"
          />
        </ng-template>

      </div>

      <!-- 📄 RIGHT -->
      <div class="right">

        <!-- ✏️ EDIT BUTTON -->
        <div class="card-header">
          <button 
            class="edit-btn" 
            (click)="showEdit = true">
            ✏️ Edit Profile
          </button>
        </div>

        <!-- 👤 NAME -->
        <h2>{{ user?.fullName || 'User' }}</h2>

        <!-- 📊 INFO -->
        <div class="info">

          <p><span>ID:</span> {{ user?.id }}</p>

          <p>
            <span>Email:</span> 
            {{ user?.email || 'Not available' }}
          </p>

          <p>
            <span>Role:</span> 
            {{ user?.role }}
          </p>

          <p>
            <span>Phone:</span> 
            {{ user?.phone || 'N/A' }}
          </p>

          <p>
            <span>Auth Provider:</span> 
            {{ user?.authProvider }}
          </p>

          <p>
            <span>Google ID:</span> 
            {{ user?.googleId || 'N/A' }}
          </p>

        </div>

      </div>

    </div>

  </ng-template>

  <!-- ✏️ EDIT MODAL -->
  <app-edit-profile
    *ngIf="showEdit"
    [user]="user"
    (close)="showEdit = false"
    (updated)="onUserUpdated($event)">
  </app-edit-profile>

</div>
