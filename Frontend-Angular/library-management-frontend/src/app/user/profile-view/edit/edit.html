<div class="modal-backdrop">

  <div class="modal">

    <h2>Edit Profile</h2>

    <!-- NAME -->
    <div class="form-group">
      <label>Full Name</label>
      <input [(ngModel)]="formData.fullName" />
    </div>

    <!-- PHONE -->
    <div class="form-group">
      <label>Phone</label>
      <input [(ngModel)]="formData.phone" />
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label>New Password (optional)</label>
      <input type="password" [(ngModel)]="formData.password" />
    </div>

    <!-- IMAGE URL -->
    <div class="form-group">
      <label>Paste Image URL</label>
      <input [(ngModel)]="formData.profileImage" />
    </div>

    <!-- FILE UPLOAD -->
    <div class="form-group">
      <label>Upload Image</label>
      <input type="file" (change)="onFileSelected($event)" />
    </div>

    <!-- PREVIEW -->
    <div class="preview" *ngIf="formData.profileImage">
      <img [src]="formData.profileImage" />
    </div>

    <!-- ACTION BUTTONS -->
    <div class="actions">
      <button class="cancel-btn" (click)="cancel()">❌ Cancel</button>
      <button class="save-btn" (click)="save()" [disabled]="isSaving">
        💾 Save
      </button>
    </div>

  </div>

</div>
