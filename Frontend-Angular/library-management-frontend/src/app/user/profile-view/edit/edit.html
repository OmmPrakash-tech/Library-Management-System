<div class="modal-backdrop">

  <div class="modal">

    <h2>Edit Profile</h2>

    <!-- Full Name -->
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="formData.fullName" />
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label>Phone</label>
      <input type="text" [(ngModel)]="formData.phone" />
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>New Password (optional)</label>
      <input type="password" [(ngModel)]="formData.password" />
    </div>

    <!-- Buttons -->
    <div class="actions">
      <button class="cancel-btn" (click)="cancel()">Cancel</button>
      <button class="save-btn" (click)="save()" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : 'Save Changes' }}
      </button>
    </div>

  </div>

</div>
